<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>ai.ebook.com</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Raleway:wght@300;400;600;700;900&family=Josefin+Sans:wght@300;400;600;700&family=Bitter:wght@400;600;700&family=Nunito:wght@400;600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --r: 18px;
      --sh: 0 10px 40px rgba(0, 0, 0, .22);
      --shh: 0 22px 60px rgba(0, 0, 0, .38);
      --tr: all .35s cubic-bezier(.4, 0, .2, 1);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #080810;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════ HEADER */
    .ph {
      text-align: center;
      padding: 64px 20px 44px;
      position: relative;
      overflow: hidden;
    }

    .ph::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 65% 35%, rgba(99, 102, 241, .18) 0%, transparent 55%),
        radial-gradient(circle at 25% 75%, rgba(244, 114, 182, .12) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(16, 185, 129, .06) 0%, transparent 60%);
      pointer-events: none;
    }

    .ph h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 800;
      letter-spacing: -3px;
      background: linear-gradient(135deg, #fff 0%, #818cf8 40%, #f472b6 70%, #34d399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }

    .ph p {
      color: rgba(255, 255, 255, .5);
      font-size: 1.1rem;
      margin-top: 14px;
      letter-spacing: .3px;
    }

    .ph-badges {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 6px 16px;
      border-radius: 50px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .12);
      color: rgba(255, 255, 255, .7);
    }

    /* ═══════════════════════════════ GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
      padding: 30px 36px 80px;
      max-width: 1700px;
      margin: 0 auto;
    }

    /* ═══════════════════════════════ CARD */
    .tcard {
      border-radius: 22px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: var(--sh);
      transition: var(--tr);
    }

    .tcard:hover {
      transform: translateY(-9px) scale(1.012);
      box-shadow: var(--shh);
    }

    .tcard .lbl {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(0, 0, 0, .68);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 13px;
      border-radius: 50px;
      z-index: 5;
    }

    /* Book-shaped preview */
    .book-prev {
      height: 260px;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    .bk-spine {
      width: 28px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bk-spine span {
      writing-mode: vertical-rl;
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: .7;
      transform: rotate(180deg);
    }

    .bk-cover {
      flex: 1;
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .bk-cover-img {
      position: absolute;
      inset: 0;
      object-fit: cover;
      width: 100%;
      height: 100%;
      opacity: .35;
    }

    .bk-cat {
      font-size: .58rem;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: .7;
      margin-bottom: auto;
      position: relative;
      z-index: 1;
    }

    .bk-title {
      font-size: 1.15rem;
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }

    .bk-sub {
      font-size: .7rem;
      opacity: .6;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .bk-author {
      font-size: .68rem;
      font-weight: 600;
      opacity: .55;
      position: relative;
      z-index: 1;
    }

    .bk-deco {
      width: 36px;
      height: 3px;
      border-radius: 2px;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .bk-page-lines {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 8px;
      background: repeating-linear-gradient(180deg, rgba(255, 255, 255, .08) 0px, rgba(255, 255, 255, .08) 1px, transparent 1px, transparent 4px);
    }

    .card-foot {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .card-tname {
      font-weight: 700;
      font-size: .9rem;
    }

    .btn-use {
      padding: 9px 20px;
      border: none;
      border-radius: 50px;
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
      white-space: nowrap;
    }

    .btn-use:hover {
      transform: scale(1.07);
    }

    /* ═══════════════════════════════ MODAL */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .88);
      backdrop-filter: blur(14px);
      z-index: 1000;
      overflow-y: auto;
      padding: 28px 14px 60px;
      align-items: flex-start;
      justify-content: center;
    }

    .overlay.open {
      display: flex;
    }

    .mc {
      width: 100%;
      max-width: 1080px;
      border-radius: 24px;
      overflow: hidden;
      animation: popIn .4s cubic-bezier(.4, 0, .2, 1);
      position: relative;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateY(38px) scale(.95)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .mhdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 28px;
      position: sticky;
      top: 0;
      z-index: 20;
      gap: 12px;
      flex-wrap: wrap;
    }

    .mhdr-title {
      font-size: 1.15rem;
      font-weight: 800;
    }

    .mhdr-acts {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-icon {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, .1);
      color: inherit;
      transition: var(--tr);
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, .18);
      transform: rotate(90deg);
    }

    .btn-edit,
    .btn-dl,
    .btn-tab {
      padding: 10px 20px;
      border-radius: 50px;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--tr);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn-edit {
      background: transparent;
      border: 2px solid rgba(255, 255, 255, .28);
      color: inherit;
    }

    .btn-edit:hover {
      background: rgba(255, 255, 255, .08);
    }

    .btn-dl:hover,
    .btn-tab:hover {
      transform: scale(1.05);
    }

    /* ═══════════════════════════════ TABS */
    .tabs {
      display: flex;
      gap: 6px;
      padding: 0 28px 0;
      margin-bottom: 0;
    }

    .tab-btn {
      padding: 8px 18px;
      border-radius: 50px 50px 0 0;
      font-size: .78rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: var(--tr);
      opacity: .5;
      background: rgba(255, 255, 255, .06);
      color: inherit;
    }

    .tab-btn.active {
      opacity: 1;
      background: rgba(255, 255, 255, .12);
    }

    /* ═══════════════════════════════ FORM AREA */
    .mwrap {
      padding: 0 28px 36px;
    }

    /* ── COVER FORM ── */
    .cover-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 18px;
    }

    .cover-upload-area {
      border-radius: 14px;
      border: 2px dashed rgba(255, 255, 255, .2);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: var(--tr);
      position: relative;
      overflow: hidden;
    }

    .cover-upload-area:hover {
      border-color: var(--ac, #818cf8);
      background: rgba(255, 255, 255, .04);
    }

    .cover-upload-area input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .cover-preview-thumb {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      display: none;
      margin-bottom: 10px;
    }

    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .upload-txt {
      font-size: .82rem;
      opacity: .55;
    }

    .upload-sub {
      font-size: .72rem;
      opacity: .35;
      margin-top: 4px;
    }

    .fields-col {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sect {
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .sect-ttl {
      font-size: .67rem;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sect-ttl::after {
      content: '';
      flex: 1;
      height: 1px;
      background: currentColor;
      opacity: .15;
    }

    .fg {
      margin-bottom: 10px;
    }

    .fg label {
      font-size: .67rem;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      opacity: .52;
      display: block;
      margin-bottom: 4px;
    }

    .fg input,
    .fg textarea,
    .fg select {
      width: 100%;
      border: none;
      border-radius: 9px;
      padding: 9px 13px;
      font-size: .85rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
      background: rgba(255, 255, 255, .07);
      color: inherit;
      border: 1.5px solid transparent;
      transition: var(--tr);
    }

    .fg input:focus,
    .fg textarea:focus,
    .fg select:focus {
      border-color: var(--ac, #818cf8);
      background: rgba(255, 255, 255, .1);
    }

    .fg input::placeholder,
    .fg textarea::placeholder {
      opacity: .32;
    }

    /* ── CHAPTERS ── */
    .chapters-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 16px;
    }

    .chapter-card {
      border-radius: 14px;
      padding: 18px;
      position: relative;
    }

    .ch-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .ch-num {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .78rem;
      font-weight: 800;
      background: var(--ac, #818cf8);
      color: #fff;
      flex-shrink: 0;
    }

    .ch-title-inp {
      flex: 1;
      border: none;
      background: transparent;
      color: inherit;
      font-size: 1rem;
      font-weight: 700;
      outline: none;
      border-bottom: 1.5px solid rgba(255, 255, 255, .15);
      padding: 4px 0;
      transition: var(--tr);
    }

    .ch-title-inp:focus {
      border-color: var(--ac, #818cf8);
    }

    .ch-title-inp::placeholder {
      opacity: .3;
    }

    .ch-rm {
      background: none;
      border: none;
      cursor: pointer;
      opacity: .4;
      font-size: 1.1rem;
      color: inherit;
      transition: var(--tr);
    }

    .ch-rm:hover {
      opacity: 1;
      transform: scale(1.2);
    }

    .ch-body {
      width: 100%;
      border: none;
      border-radius: 9px;
      padding: 12px;
      font-size: .85rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
      min-height: 120px;
      background: rgba(255, 255, 255, .05);
      color: inherit;
      border: 1.5px solid transparent;
      transition: var(--tr);
    }

    .ch-body:focus {
      border-color: var(--ac, #818cf8);
    }

    .ch-body::placeholder {
      opacity: .28;
    }

    .ch-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .add-ch-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1.5px dashed rgba(255, 255, 255, .2);
      background: transparent;
      color: inherit;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--tr);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
    }

    .add-ch-btn:hover {
      border-color: var(--ac, #818cf8);
      background: rgba(255, 255, 255, .04);
    }

    /* ── BOOK SETTINGS ── */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    /* ═══════════════════════════════ PREVIEW */
    .preview-book {
      background: #fff;
      color: #111;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0, 0, 0, .5);
      max-width: 820px;
      margin: 20px auto 0;
    }

    /* Cover page */
    .eb-cover {
      min-height: 560px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      page-break-after: always;
    }

    .eb-cover-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .eb-cover-overlay {
      position: absolute;
      inset: 0;
    }

    .eb-cover-content {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 50px 48px;
    }

    .eb-cover-cat {
      font-size: .65rem;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: auto;
      opacity: .75;
    }

    .eb-cover-title {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .eb-cover-subtitle {
      font-size: 1.05rem;
      opacity: .75;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .eb-cover-deco {
      width: 56px;
      height: 4px;
      border-radius: 2px;
      margin-bottom: 20px;
    }

    .eb-cover-author {
      font-size: .88rem;
      font-weight: 600;
      opacity: .7;
    }

    .eb-cover-edition {
      font-size: .72rem;
      opacity: .45;
      margin-top: 4px;
    }

    /* TOC */
    .eb-toc {
      padding: 50px 48px;
      min-height: 300px;
      page-break-after: always;
    }

    .eb-toc-title {
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .eb-toc-deco {
      width: 40px;
      height: 3px;
      border-radius: 2px;
      margin-bottom: 28px;
    }

    .toc-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(0, 0, 0, .07);
      font-size: .9rem;
    }

    .toc-ch-num {
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: 1px;
      opacity: .5;
      width: 22px;
      flex-shrink: 0;
    }

    .toc-ch-title {
      flex: 1;
      font-weight: 600;
    }

    .toc-dots {
      flex: 1;
      border-bottom: 1px dotted rgba(0, 0, 0, .2);
      margin: 0 8px;
      min-width: 20px;
    }

    .toc-page {
      font-size: .78rem;
      opacity: .5;
      font-weight: 700;
    }

    /* Chapter pages */
    .eb-chapter {
      padding: 50px 48px;
      min-height: 500px;
      page-break-before: always;
      page-break-after: always;
    }

    .eb-ch-header {
      margin-bottom: 32px;
    }

    .eb-ch-num-label {
      font-size: .62rem;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: .45;
      margin-bottom: 6px;
    }

    .eb-ch-title {
      font-size: 2rem;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .eb-ch-deco {
      width: 40px;
      height: 3px;
      border-radius: 2px;
      margin-bottom: 0;
    }

    .eb-ch-body {
      font-size: .95rem;
      line-height: 1.85;
      opacity: .82;
      white-space: pre-wrap;
    }

    .eb-ch-quote {
      border-left: 4px solid var(--ac, #818cf8);
      padding: 12px 20px;
      margin: 20px 0;
      font-style: italic;
      opacity: .75;
      font-size: 1rem;
    }

    /* Back cover */
    .eb-back {
      min-height: 320px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 50px 48px;
      position: relative;
      overflow: hidden;
      page-break-before: always;
    }

    .eb-back-title {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .eb-back-desc {
      font-size: .9rem;
      line-height: 1.75;
      opacity: .75;
      margin-bottom: 28px;
    }

    .eb-back-author-box {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .eb-back-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 800;
    }

    .eb-back-aname {
      font-weight: 700;
      font-size: .9rem;
    }

    .eb-back-arole {
      font-size: .78rem;
      opacity: .55;
    }

    /* ── Notification ── */
    .notif {
      position: fixed;
      bottom: 26px;
      right: 26px;
      padding: 14px 26px;
      border-radius: 12px;
      background: #10b981;
      color: #fff;
      font-weight: 700;
      font-size: .88rem;
      box-shadow: 0 8px 28px rgba(16, 185, 129, .4);
      z-index: 9999;
      animation: nin .38s ease, nout .4s 2.6s forwards;
    }

    @keyframes nin {
      from {
        opacity: 0;
        transform: translateY(18px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    @keyframes nout {
      to {
        opacity: 0;
        transform: translateY(-12px)
      }
    }

    /* ════════════════════════════════════════════
   TEMPLATE COLOUR TOKENS  (card-level)
   ══════════════════════════════════════════ */
    /* T1 – Midnight Ink */
    .t1 .book-prev {
      background: #0d0d1a;
    }

    .t1 .bk-spine {
      background: #1a1a3e;
      color: #818cf8;
    }

    .t1 .bk-cover {
      background: linear-gradient(160deg, #0d0d1a 0%, #1a1a3e 100%);
      color: #e0e0ff;
    }

    .t1 .bk-deco {
      background: #818cf8;
    }

    .t1 .card-foot {
      background: #0d0d1a;
    }

    .t1 .card-tname {
      color: #818cf8;
    }

    .t1 .btn-use {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
    }

    /* T2 – Cream & Crimson */
    .t2 .book-prev {
      background: #fffbf5;
    }

    .t2 .bk-spine {
      background: #9b1c1c;
      color: #fecaca;
    }

    .t2 .bk-cover {
      background: #fffbf5;
      color: #1a0505;
    }

    .t2 .bk-deco {
      background: #dc2626;
    }

    .t2 .card-foot {
      background: #fff;
    }

    .t2 .card-tname {
      color: #9b1c1c;

    /* ============================================================
       RENDER CARDS
    ============================================================ */
    function renderCards() {
      const g = document.getElementById('grid');
      g.innerHTML = '';
      TEMPLATES.forEach(t => {
        const card = document.createElement('div');
        card.className = 'tcard ' + t.cls;
        card.style.position = 'relative';
        card.innerHTML = `
      <div class="lbl">${t.label}</div>
      <div class="book-prev">
        <div class="bk-spine"><span>${t.name}</span></div>
        <div class="bk-cover">
          <div class="bk-cat">${t.cat}</div>
          <div class="bk-title">${t.title}</div>
          <div class="bk-deco"></div>
          <div class="bk-sub">${t.sub}</div>
          <div class="bk-author">— ${t.author}</div>
          <div class="bk-page-lines"></div>
        </div>
      </div>
      <div class="card-foot">
        <div class="card-tname">${t.name}</div>
        <button class="btn-use" onclick="openT(${t.id})">Use Template →</button>
      </div>
    `;
        g.appendChild(card);
      });
    }

    /* ============================================================
       OPEN / CLOSE
    ============================================================ */
    function openT(id) {
      activeT = TEMPLATES.find(t => t.id === id);
      isEdit = false;
      activeTab = 'cover';
      coverImageDataURL = null;

      // Pre-fill with template defaults if user hasn't typed yet
      if (!D.title) D.title = activeT.title;
      if (!D.subtitle) D.subtitle = activeT.sub;
      if (!D.category) D.category = activeT.cat;
      if (!D.author) D.author = activeT.author;

      const mc = document.getElementById('mc');
      mc.className = 'mc mc-' + activeT.cls;
      document.getElementById('mtitle').textContent = activeT.name + ' eBook';
      document.getElementById('bEdit').textContent = '✏️ Edit Book';
      document.getElementById('tabs').style.display = 'none';
      renderPreview();
      document.getElementById('overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('overlay').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.getElementById('overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('overlay')) closeModal();
    });

    /* ============================================================
       TABS
    ============================================================ */
    function switchTab(tab, btn) {
      activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderFormTab();
    }

    /* ============================================================
       TOGGLE EDIT / PREVIEW
    ============================================================ */
    function toggleEdit() {
      if (isEdit) {
        collectData();
        renderPreview();
        isEdit = false;
        document.getElementById('bEdit').textContent = '✏️ Edit Book';
        document.getElementById('tabs').style.display = 'none';
      } else {
        isEdit = true;
        document.getElementById('bEdit').textContent = '👁 Preview';
        document.getElementById('tabs').style.display = 'flex';
        activeTab = 'cover';
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
        renderFormTab();
      }
    }

    function renderFormTab() {
      if (activeTab === 'cover') renderCoverForm();
      else if (activeTab === 'chapters') renderChaptersForm();
      else renderSettingsForm();
    }

       COVER FORM
    ============================================================ */
    function renderCoverForm() {
      document.getElementById('mbody').innerHTML = `

      </div>
      ${coverImageDataURL ? `<button onclick="removeCoverImage()" style="width:100%;margin-top:8px;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:transparent;color:inherit;cursor:pointer;font-size:.8rem;">✕ Remove Image</button>` : ''}

    <!-- Fields column -->
    <div class="fields-col">
      <div class="sect">

        <div class="fg"><label>Book Title</label>
          <input id="f-title" placeholder="e.g. The Art of Deep Work" value="${x(D.title)}"></div>
        <div class="fg"><label>Subtitle</label>
          <input id="f-sub" placeholder="e.g. Rules for Focused Success in a Distracted World" value="${x(D.subtitle)}"></div>
        <div class="fg"><label>Category / Genre</label>
          <input id="f-cat" placeholder="e.g. Self-Help · Business · Fiction · Science" value="${x(D.category)}"></div>
      </div>

      <div class="sect">

          <input id="f-author" placeholder="e.g. Dr. Alexandra Morgan" value="${x(D.author)}"></div>
        <div class="fg"><label>Author Bio (for back cover)</label>
          <textarea id="f-bio" rows="3" placeholder="Brief 2-3 sentence bio about the author, their expertise, and achievements...">${x(D.authorBio)}</textarea></div>
      </div>

      <div class="sect">
        <div class="sect-ttl">Publication Info</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div class="fg"><label>Edition</label>
            <input id="f-edition" placeholder="First Edition" value="${x(D.edition)}"></div>

      document.getElementById('coverFileInp').addEventListener('change', function () { handleCoverUpload(this); });
    }

    function handleCoverUpload(inp) {
      const file = inp.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        coverImageDataURL = e.target.result;
        renderCoverForm();
        notify('✅ Cover image uploaded!');
      };
      reader.readAsDataURL(file);
    }

    function removeCoverImage() {
      coverImageDataURL = null;
      renderCoverForm();
    }

    /* ============================================================
       CHAPTERS FORM
    ============================================================ */
    function renderChaptersForm() {
      document.getElementById('mbody').innerHTML = `
  <div style="margin-top:16px;">
    <div style="font-size:.8rem;opacity:.5;margin-bottom:14px;">
      💡 Each chapter gets its own beautifully formatted page in the eBook
    </div>
    <div class="chapters-list" id="ch-list">
      ${D.chapters.map(chapterCard).join('')}
    </div>
    <button class="add-ch-btn" onclick="addChapter()">＋ Add New Chapter</button>
  </div>`;
    }

    function chapterCard(ch, i) {
      return `<div class="chapter-card sect" id="ch-${i}">
    <div class="ch-hdr">
      <div class="ch-num">${i + 1}</div>
      <input class="ch-title-inp" placeholder="Chapter Title…" value="${x(ch.title)}"
        onchange="D.chapters[${i}].title=this.value">
      <button class="ch-rm" onclick="removeChapter(${i})" title="Remove chapter">✕</button>
    </div>
    <div class="fg" style="margin-bottom:8px;">
      <label>Chapter Subtitle / Tagline (optional)</label>
      <input placeholder="e.g. Where the journey truly begins…" value="${x(ch.subtitle || '')}"
        onchange="D.chapters[${i}].subtitle=this.value">
    </div>
    <textarea class="ch-body" placeholder="Write your chapter content here…&#10;&#10;You can write as much as you need. Include stories, insights, examples, quotes — anything that enriches your chapter.&#10;&#10;Press Enter for new paragraphs."
      onchange="D.chapters[${i}].content=this.value">${x(ch.content)}</textarea>
    <div class="ch-meta">
      <div class="fg">
        <label>Opening Quote (optional)</label>
        <input placeholder='"A quote that sets the tone…"' value="${x(ch.quote || '')}"
          onchange="D.chapters[${i}].quote=this.value">
      </div>
      <div class="fg">
        <label>Quote Attribution</label>
        <input placeholder="— Author Name" value="${x(ch.quoteBy || '')}"
          onchange="D.chapters[${i}].quoteBy=this.value">
      </div>
    </div>
  </div>`;
    }

    function addChapter() {
      D.chapters.push({ title: `Chapter ${D.chapters.length + 1}`, content: '', subtitle: '', quote: '', quoteBy: '' });
      renderChaptersForm();
      // Scroll to new chapter
      setTimeout(() => {
        const last = document.getElementById(`ch-${D.chapters.length - 1}`);
        if (last) last.scrollIntoView({ behavior: 'smooth' });
      }, 100);
    }

    function removeChapter(i) {
      if (D.chapters.length <= 1) { notify('⚠️ Keep at least one chapter!'); return; }
      D.chapters.splice(i, 1);
      renderChaptersForm();
    }

    /* ============================================================
       SETTINGS FORM
    ============================================================ */
    function renderSettingsForm() {
      document.getElementById('mbody').innerHTML = `
  <div class="settings-grid" style="margin-top:16px;">
    <div class="sect">
      <div class="sect-ttl">Typography</div>
      <div class="fg"><label>Body Font Size</label>
        <select id="s-fs" onchange="D.fontSize=this.value">
          <option value="small" ${D.fontSize === 'small' ? 'selected' : ''}>Small (14px)</option>
          <option value="medium" ${D.fontSize === 'medium' ? 'selected' : ''}>Medium (16px) — Recommended</option>
          <option value="large" ${D.fontSize === 'large' ? 'selected' : ''}>Large (18px)</option>
          <option value="xlarge" ${D.fontSize === 'xlarge' ? 'selected' : ''}>Extra Large (20px)</option>
        </select>
      </div>
      <div class="fg"><label>Line Spacing</label>
        <select id="s-lh" onchange="D.lineHeight=this.value">
          <option value="compact" ${D.lineHeight === 'compact' ? 'selected' : ''}>Compact (1.5)</option>
          <option value="relaxed" ${D.lineHeight === 'relaxed' ? 'selected' : ''}>Relaxed (1.8) — Recommended</option>
          <option value="spacious" ${D.lineHeight === 'spacious' ? 'selected' : ''}>Spacious (2.2)</option>
        </select>
      </div>
    </div>
    <div class="sect">
      <div class="sect-ttl">Book Structure</div>
      <div class="fg">
        <label style="display:flex;align-items:center;gap:10px;text-transform:none;font-size:.88rem;opacity:1;">
          <input type="checkbox" id="s-toc" ${D.showTOC ? 'checked' : ''} onchange="D.showTOC=this.checked" style="width:auto;border-radius:4px;">
          Include Table of Contents page
        </label>
      </div>
      <div class="fg">
        <label style="display:flex;align-items:center;gap:10px;text-transform:none;font-size:.88rem;opacity:1;">
          <input type="checkbox" id="s-pn" ${D.showPageNumbers ? 'checked' : ''} onchange="D.showPageNumbers=this.checked" style="width:auto;border-radius:4px;">
          Show page numbers in footer
        </label>
      </div>
    </div>
  </div>`;
    }

    /* ============================================================
       COLLECT DATA
    ============================================================ */
    function collectData() {
      const g = id => document.getElementById(id)?.value || '';
      D.title = g('f-title') || D.title;
      D.subtitle = g('f-sub') || D.subtitle;
      D.category = g('f-cat') || D.category;
      D.author = g('f-author') || D.author;
      D.authorBio = g('f-bio') || D.authorBio;
      D.edition = g('f-edition') || D.edition;
      D.year = g('f-year') || D.year;
      D.publisher = g('f-pub') || D.publisher;
      D.isbn = g('f-isbn') || D.isbn;
      D.blurb = g('f-blurb') || D.blurb;
      // Chapters collected live via onchange
    }

    /* ============================================================
       PREVIEW
    ============================================================ */
    function renderPreview() {
      const t = activeT;
      const d = D;
      const fs = { small: '14px', medium: '16px', large: '18px', xlarge: '20px' }[d.fontSize] || '16px';
      const lh = { compact: '1.5', relaxed: '1.8', spacious: '2.2' }[d.lineHeight] || '1.8';

      const coverImg = coverImageDataURL
        ? `<img class="eb-cover-img" src="${coverImageDataURL}" alt="Cover">`
        : '';
      const overlay = coverImageDataURL
        ? `<div class="eb-cover-overlay" style="background:linear-gradient(to bottom,rgba(0,0,0,.3) 0%,rgba(0,0,0,.6) 100%);"></div>`
        : `<div class="eb-cover-overlay" style="background:${t.coverBg};"></div>`;

      let tocHTML = '';
      if (d.showTOC) {
        tocHTML = `<div class="eb-toc" style="background:#fff;font-family:'${t.bodyFont}',serif;">
      <div class="eb-toc-title" style="font-family:'${t.headFont}',serif;color:#111;">Contents</div>
      <div class="eb-toc-deco" style="background:${t.accentColor};"></div>
      ${d.chapters.map((ch, i) => `
        <div class="toc-item">
          <span class="toc-ch-num">0${i + 1}</span>
          <span class="toc-ch-title">${x(ch.title || 'Chapter ' + (i + 1))}</span>
          <span class="toc-dots"></span>
          <span class="toc-page">${4 + i}</span>
        </div>`).join('')}
    </div>`;
      }

      const chaptersHTML = d.chapters.map((ch, i) => `
    <div class="eb-chapter" style="background:#fff;font-family:'${t.bodyFont}',serif;">
      <div class="eb-ch-header">
        <div class="eb-ch-num-label" style="color:${t.accentColor};">Chapter 0${i + 1}</div>
        <div class="eb-ch-title" style="font-family:'${t.headFont}',serif;color:#111;">${x(ch.title || 'Untitled Chapter')}</div>
        ${ch.subtitle ? `<div style="font-size:.95rem;opacity:.6;margin-top:6px;font-style:italic;">${x(ch.subtitle)}</div>` : ''}
        <div class="eb-ch-deco" style="background:${t.accentColor};margin-top:14px;"></div>
      </div>
      ${ch.quote ? `<div class="eb-ch-quote" style="border-color:${t.accentColor};color:#333;">${x(ch.quote)}${ch.quoteBy ? `<div style="font-size:.82rem;margin-top:6px;font-style:normal;opacity:.6;">${x(ch.quoteBy)}</div>` : ''}</div>` : ''}
      <div class="eb-ch-body" style="font-size:${fs};line-height:${lh};color:#222;">${x(ch.content) || '<span style="opacity:.3">No content yet. Click ✏️ Edit Book → Chapters to add content.</span>'}</div>
      ${d.showPageNumbers ? `<div style="text-align:center;padding-top:28px;font-size:.72rem;opacity:.35;color:#111;">— ${4 + i} —</div>` : ''}
    </div>`).join('');

      const initials = d.author ? d.author.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() : 'AU';

      document.getElementById('mbody').innerHTML = `
  <div class="preview-book" id="ebookRoot">

    <!-- COVER PAGE -->
    <div class="eb-cover" style="min-height:580px;">
      ${coverImg}
      ${overlay}
      <div class="eb-cover-content" style="color:${coverImageDataURL ? '#fff' : t.coverColor};">
        <div class="eb-cover-cat" style="font-family:'${t.headFont}',serif;">${x(d.category || t.cat)}</div>
        <div style="flex:1;"></div>
        <div class="eb-cover-deco" style="background:${t.accentColor};margin-bottom:16px;"></div>
        <div class="eb-cover-title" style="font-family:'${t.headFont}',serif;">${x(d.title || t.title)}</div>
        <div class="eb-cover-subtitle">${x(d.subtitle || t.sub)}</div>
        <div class="eb-cover-author">by ${x(d.author || t.author)}</div>
        <div class="eb-cover-edition" style="margin-top:6px;">${x(d.edition)} · ${x(d.year)}${d.publisher ? ' · ' + x(d.publisher) : ''}</div>
      </div>
    </div>

    <!-- COPYRIGHT PAGE -->
    <div style="padding:50px 48px;background:#fff;color:#444;font-size:.8rem;line-height:1.8;border-top:1px solid #f0f0f0;">
      <div style="font-family:'${t.headFont}',serif;font-size:1.1rem;color:#111;margin-bottom:16px;">${x(d.title || t.title)}</div>
      <div>Copyright © ${x(d.year)} ${x(d.author || t.author)}. All rights reserved.</div>
      ${d.publisher ? `<div>Published by ${x(d.publisher)}</div>` : ''}
      ${d.isbn ? `<div>ISBN: ${x(d.isbn)}</div>` : ''}
      <div style="margin-top:12px;opacity:.6;">No part of this publication may be reproduced, distributed, or transmitted in any form or by any means without the prior written permission of the author.</div>
      <div style="margin-top:16px;width:30px;height:2px;background:${t.accentColor};border-radius:2px;"></div>
    </div>

    <!-- TABLE OF CONTENTS -->
    ${tocHTML}

    <!-- CHAPTERS -->
    ${chaptersHTML}

    <!-- BACK COVER -->
    <div class="eb-back" style="background:${t.coverBg.startsWith('linear') || t.coverBg.startsWith('#0') || t.coverBg.startsWith('#1') ? t.coverBg : '#1a1a2e'};color:${coverImageDataURL ? '#fff' : t.coverColor};">
      <div style="width:36px;height:3px;border-radius:2px;background:${t.accentColor};margin-bottom:20px;"></div>
      <div class="eb-back-title" style="font-family:'${t.headFont}',serif;">${x(d.title || t.title)}</div>
      <div class="eb-back-desc">${x(d.blurb) || `A compelling exploration by ${x(d.author || t.author)}. Add your back cover description in the Cover tab to entice readers to open this book.`}</div>
      <div class="eb-back-author-box">
        <div class="eb-back-avatar" style="background:${t.accentColor};color:#fff;">${initials}</div>
        <div>
          <div class="eb-back-aname">${x(d.author || t.author)}</div>
          <div class="eb-back-arole">${x(d.authorBio) || 'Author'}</div>
        </div>
      </div>
      ${d.isbn ? `<div style="margin-top:24px;font-size:.72rem;opacity:.35;">ISBN ${x(d.isbn)}</div>` : ''}
    </div>

  </div>`;
    }

    /* ============================================================
       DOWNLOAD eBOOK AS PDF (browser print)
    ============================================================ */
    function downloadBook() {
      if (isEdit) {
        collectData(); renderPreview(); isEdit = false;
        document.getElementById('bEdit').textContent = '✏️ Edit Book';
        document.getElementById('tabs').style.display = 'none';
      }

      const root = document.getElementById('ebookRoot');
      if (!root) { notify('⚠️ Open a template first.'); return; }

      const btn = document.getElementById('bDl');
      btn.textContent = '⏳ Preparing PDF…';
      btn.disabled = true;

      const t = activeT;
      const d = D;
      const fs = { small: '14px', medium: '16px', large: '18px', xlarge: '20px' }[d.fontSize] || '16px';
      const lh = { compact: '1.5', relaxed: '1.8', spacious: '2.2' }[d.lineHeight] || '1.8';

      const coverImgTag = coverImageDataURL
        ? `<img style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" src="${coverImageDataURL}">`
        : '';
      const coverOverlay = coverImageDataURL
        ? `<div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.3),rgba(0,0,0,.6));"></div>`
        : `<div style="position:absolute;inset:0;background:${t.coverBg};"></div>`;
      const coverTextColor = coverImageDataURL ? '#fff' : t.coverColor;

      let tocRows = '';
      if (d.showTOC) {
        tocRows = d.chapters.map((ch, i) => `
      <div style="display:flex;align-items:baseline;gap:8px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.07);font-size:.9rem;">
        <span style="font-size:.7rem;font-weight:800;letter-spacing:1px;opacity:.5;width:22px;">0${i + 1}</span>
        <span style="flex:1;font-weight:600;">${x(ch.title || 'Chapter ' + (i + 1))}</span>
        <span style="flex:1;border-bottom:1px dotted rgba(0,0,0,.2);min-width:20px;"></span>
        <span style="font-size:.78rem;opacity:.5;font-weight:700;">${4 + i}</span>
      </div>`).join('');
      }

      const chaptersHtml = d.chapters.map((ch, i) => `
    <div style="padding:50px 48px;min-height:500px;page-break-before:always;page-break-after:always;background:#fff;font-family:'${t.bodyFont}',Georgia,serif;">
      <div style="margin-bottom:30px;">
        <div style="font-size:.62rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;opacity:.45;margin-bottom:6px;color:${t.accentColor};">Chapter 0${i + 1}</div>
        <div style="font-size:2rem;font-weight:900;line-height:1.2;margin-bottom:10px;color:#111;font-family:'${t.headFont}',Georgia,serif;">${x(ch.title || 'Untitled')}</div>
        ${ch.subtitle ? `<div style="font-size:.95rem;opacity:.6;margin-top:6px;font-style:italic;color:#333;">${x(ch.subtitle)}</div>` : ''}
        <div style="width:40px;height:3px;border-radius:2px;background:${t.accentColor};margin-top:14px;"></div>
      </div>
      ${ch.quote ? `<div style="border-left:4px solid ${t.accentColor};padding:12px 20px;margin:20px 0;font-style:italic;opacity:.75;font-size:1rem;color:#333;">${x(ch.quote)}${ch.quoteBy ? `<div style="font-size:.82rem;margin-top:6px;font-style:normal;opacity:.6;">${x(ch.quoteBy)}</div>` : ''}</div>` : ''}
      <div style="font-size:${fs};line-height:${lh};color:#222;white-space:pre-wrap;">${x(ch.content) || ''}</div>
      ${d.showPageNumbers ? `<div style="text-align:center;padding-top:28px;font-size:.72rem;opacity:.35;color:#111;">— ${4 + i} —</div>` : ''}
    </div>`).join('');

      const initials = d.author ? d.author.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() : 'AU';

      const html = `<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>${x(d.title || t.title)}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600&family=Syne:wght@700;800&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Bitter:wght@700&family=Space+Mono:wght@400;700&family=Raleway:wght@700;900&family=Josefin+Sans:wght@600;700&family=EB+Garamond:wght@400;500&family=Crimson+Pro:wght@400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'${t.bodyFont}',Georgia,serif;}
  @page{size:A4;margin:0;}
  @media print{
    body{margin:0;}
    .no-print{display:none;}
    .page-break{page-break-after:always;}
  }
</style>
</head>
<body>

<!-- COVER -->
<div style="min-height:297mm;display:flex;flex-direction:column;position:relative;overflow:hidden;page-break-after:always;">
  ${coverImgTag}
  ${coverOverlay}
  <div style="position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:60px 56px;color:${coverTextColor};">
    <div style="font-size:.65rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;opacity:.7;margin-bottom:auto;font-family:'${t.headFont}',serif;">${x(d.category || t.cat)}</div>
    <div style="flex:1;"></div>
    <div style="width:56px;height:4px;border-radius:2px;background:${t.accentColor};margin-bottom:18px;"></div>
    <div style="font-size:3rem;font-weight:900;line-height:1.1;margin-bottom:14px;font-family:'${t.headFont}',serif;">${x(d.title || t.title)}</div>
    <div style="font-size:1.1rem;opacity:.75;margin-bottom:24px;line-height:1.5;">${x(d.subtitle || t.sub)}</div>
    <div style="font-size:.88rem;font-weight:600;opacity:.7;">by ${x(d.author || t.author)}</div>
    <div style="font-size:.72rem;opacity:.45;margin-top:4px;">${x(d.edition)} · ${x(d.year)}${d.publisher ? ' · ' + x(d.publisher) : ''}</div>
  </div>
</div>

<!-- COPYRIGHT -->
<div style="padding:60px 56px;background:#fff;color:#444;font-size:.8rem;line-height:1.9;page-break-after:always;min-height:80mm;">
  <div style="font-family:'${t.headFont}',serif;font-size:1.1rem;color:#111;margin-bottom:18px;">${x(d.title || t.title)}</div>
  <div>Copyright © ${x(d.year)} ${x(d.author || t.author)}. All rights reserved.</div>
  ${d.publisher ? `<div>Published by ${x(d.publisher)}</div>` : ''}
  ${d.isbn ? `<div>ISBN: ${x(d.isbn)}</div>` : ''}
  <div style="margin-top:14px;opacity:.55;">No part of this publication may be reproduced without the prior written permission of the author.</div>
  <div style="margin-top:18px;width:30px;height:2px;background:${t.accentColor};border-radius:2px;"></div>
</div>

${d.showTOC ? `
<!-- TABLE OF CONTENTS -->
<div style="padding:60px 56px;background:#fff;min-height:200mm;page-break-after:always;font-family:'${t.bodyFont}',Georgia,serif;">
  <div style="font-size:2rem;font-weight:900;margin-bottom:10px;font-family:'${t.headFont}',serif;color:#111;">Contents</div>
  <div style="width:40px;height:3px;border-radius:2px;background:${t.accentColor};margin-bottom:32px;"></div>
  ${tocRows}
</div>`: ''}

<!-- CHAPTERS -->
${chaptersHtml}

<!-- BACK COVER -->
<div style="min-height:120mm;display:flex;flex-direction:column;justify-content:center;padding:60px 56px;background:${t.coverBg.includes('gradient') || t.coverBg.startsWith('#0') || t.coverBg.startsWith('#1') ? t.coverBg : '#1a1a2e'};color:${coverTextColor};page-break-before:always;">
  <div style="width:36px;height:3px;border-radius:2px;background:${t.accentColor};margin-bottom:22px;"></div>
  <div style="font-size:1.6rem;font-weight:900;margin-bottom:14px;font-family:'${t.headFont}',serif;">${x(d.title || t.title)}</div>
  <div style="font-size:.9rem;line-height:1.8;opacity:.75;margin-bottom:28px;max-width:520px;">${x(d.blurb) || 'A remarkable book by ' + x(d.author || t.author) + '.'}</div>
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:50px;height:50px;border-radius:50%;background:${t.accentColor};color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;">${initials}</div>
    <div>
      <div style="font-weight:700;font-size:.9rem;">${x(d.author || t.author)}</div>
      <div style="font-size:.78rem;opacity:.55;">${x(d.authorBio) || 'Author'}</div>
    </div>
  </div>
  ${d.isbn ? `<div style="margin-top:28px;font-size:.72rem;opacity:.3;">ISBN ${x(d.isbn)}</div>` : ''}
</div>

<div class="no-print" style="padding:30px;text-align:center;background:#f5f5f5;font-family:sans-serif;">
  <h2 style="margin-bottom:12px;">📚 Your eBook is Ready!</h2>
  <p style="margin-bottom:20px;color:#555;">Use your browser's Print function to save as PDF</p>
  <button onclick="window.print()" style="padding:14px 36px;background:#111;color:#fff;border:none;border-radius:50px;font-size:1rem;font-weight:700;cursor:pointer;">🖨 Print / Save as PDF</button>
  <button onclick="window.close()" style="padding:14px 28px;background:transparent;color:#666;border:1px solid #ccc;border-radius:50px;font-size:.9rem;font-weight:600;cursor:pointer;margin-left:12px;">Close</button>
  <p style="margin-top:14px;font-size:.75rem;color:#999;">In print dialog: set Destination to "Save as PDF", Paper to A4, Margins to None</p>
</div>

</body></html>`;

      const w = window.open('', '_blank', 'width=960,height=800');
      if (!w) { notify('⚠️ Pop-up blocked! Please allow pop-ups.'); btn.textContent = '⬇ Download eBook PDF'; btn.disabled = false; return; }
      w.document.write(html);
      w.document.close();
      w.focus();
      setTimeout(() => {
        w.print();
        btn.textContent = '⬇ Download eBook PDF';
        btn.disabled = false;
        notify('✅ eBook ready — Save as PDF in the print dialog!');
      }, 800);
    }

    /* ============================================================
       HELPERS
    ============================================================ */
    function x(v) {
      return String(v || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function notify(msg) {
      const n = document.createElement('div');
      n.className = 'notif'; n.textContent = msg;
      document.body.appendChild(n);
      setTimeout(() => n.remove(), 3200);
    }

    /* ── INIT ── */
    renderCards();
  </script>
</body>

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: #0f0f13;
        color: #fff;
        min-height: 100vh;
      }

      /* ── PAGE HEADER ── */
      .page-header {
        text-align: center;
        padding: 60px 20px 40px;
        background: #0f0f13;
        position: relative;
        overflow: hidden;
      }
      .page-header::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at 60% 40%,
            rgba(120, 80, 255, 0.15) 0%,
            transparent 55%
          ),
          radial-gradient(
            circle at 20% 80%,
            rgba(255, 80, 120, 0.08) 0%,
            transparent 50%
          );
        pointer-events: none;
      }
      .page-header h1 {
        font-family: "Syne", sans-serif;
        font-size: clamp(2.5rem, 6vw, 5rem);
        font-weight: 800;
        letter-spacing: -2px;
        background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #f472b6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        position: relative;
      }
      .page-header p {
        color: rgba(255, 255, 255, 0.5);
        font-size: 1.1rem;
        margin-top: 12px;
      }

      /* ── GRID ── */
      .templates-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 28px;
        padding: 40px 40px 80px;
        max-width: 1600px;
        margin: 0 auto;
      }

      /* ── CARD ── */
      .template-card {
        border-radius: 20px;
        overflow: hidden;
        cursor: pointer;
        transition:
          transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
          box-shadow 0.35s;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
      }
      .template-card:hover {
        transform: translateY(-8px) scale(1.015);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      }

      .card-label {
        position: absolute;
        top: 14px;
        right: 14px;
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(8px);
        color: #fff;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 50px;
        z-index: 10;
      }

      .card-preview {
        height: 240px;
        display: flex;
        position: relative;
        overflow: hidden;
      }

      .card-actions {
        padding: 18px 22px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .card-name {
        font-weight: 700;
        font-size: 0.95rem;
      }

      .btn-use {
        padding: 9px 22px;
        border: none;
        border-radius: 50px;
        font-size: 0.82rem;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.25s;
        white-space: nowrap;
      }
      .btn-use:hover {
        transform: scale(1.06);
      }

      /* ── PREVIEW INNER PARTS ── */
      .p-side {
        width: 38%;
        display: flex;
        flex-direction: column;
        padding: 14px;
        gap: 7px;
      }
      .p-main {
        flex: 1;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .p-avatar {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        margin-bottom: 6px;
        flex-shrink: 0;
      }
      .p-line {
        height: 7px;
        border-radius: 4px;
      }
      .p-block {
        height: 36px;
        border-radius: 8px;
      }
      .p-sm {
        width: 62%;
      }
      .p-xs {
        width: 42%;
      }

      /* ── MODAL ── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(12px);
        z-index: 1000;
        overflow-y: auto;
        padding: 30px 16px 50px;
        align-items: flex-start;
        justify-content: center;
      }
      .modal-overlay.active {
        display: flex;
      }

      .modal-container {
        width: 100%;
        max-width: 960px;
        border-radius: 22px;
        overflow: hidden;
        animation: popIn 0.38s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
      }
      @keyframes popIn {
        from {
          opacity: 0;
          transform: translateY(36px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 28px;
        position: sticky;
        top: 0;
        z-index: 20;
        gap: 12px;
        flex-wrap: wrap;
      }
      .modal-title {
        font-size: 1.2rem;
        font-weight: 800;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .btn-close {
        width: 42px;
        height: 42px;
        border: none;
        border-radius: 50%;
        font-size: 1.3rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.1);
        color: inherit;
        transition:
          transform 0.25s,
          background 0.25s;
        flex-shrink: 0;
      }
      .btn-close:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: rotate(90deg);
      }

      .btn-edit,
      .btn-dl {
        padding: 10px 22px;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.25s,
          opacity 0.25s;
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }
      .btn-edit:hover,
      .btn-dl:hover {
        transform: scale(1.05);
      }
      .btn-edit {
        background: transparent;
        border: 2px solid rgba(255, 255, 255, 0.3);
        color: inherit;
      }
      .btn-edit:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      /* form wrapper */
      .cv-wrap {
        padding: 0 28px 28px;
      }

      .two-col {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 20px;
      }

      .sidebar,
      .main-col {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .section {
        border-radius: 14px;
        padding: 18px;
        transition: transform 0.3s;
      }
      .section:hover {
        transform: translateY(-2px);
      }

      .sec-title {
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .sec-title::after {
        content: "";
        flex: 1;
        height: 1px;
        background: currentColor;
        opacity: 0.18;
      }

      .fg {
        margin-bottom: 10px;
      }
      .fg label {
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        opacity: 0.55;
        display: block;
        margin-bottom: 4px;
      }

      .fg input,
      .fg textarea,
      .fg select {
        width: 100%;
        border: none;
        border-radius: 9px;
        padding: 9px 12px;
        font-size: 0.85rem;
        font-family: inherit;
        outline: none;
        transition:
          border 0.25s,
          background 0.25s;
        resize: vertical;
        background: rgba(255, 255, 255, 0.07);
        color: inherit;
        border: 1.5px solid transparent;
      }
      .fg input:focus,
      .fg textarea:focus {
        border-color: var(--ac, #7c3aed);
        background: rgba(255, 255, 255, 0.11);
      }
      .fg input::placeholder,
      .fg textarea::placeholder {
        opacity: 0.35;
      }

      .skills-box {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        padding: 9px;
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.07);
        min-height: 72px;
        border: 1.5px solid transparent;
        transition: border 0.25s;
      }
      .skills-box:focus-within {
        border-color: var(--ac, #7c3aed);
      }

      .stag {
        padding: 4px 12px;
        border-radius: 50px;
        font-size: 0.76rem;
        font-weight: 600;

        align-items: center;
        gap: 5px;
        background: rgba(255, 255, 255, 0.12);
      }
      .stag .rx {

        line-height: 1;

        background: transparent;
        color: inherit;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition:

        margin-top: 6px;

      .entry {

        background: rgba(255, 255, 255, 0.05);
        margin-bottom: 9px;
        position: relative;
      }
      .entry .rm {

      .notif {

  <body>
    <!-- PAGE HEADER -->
    <header class="page-header">
      <h1>CV Builder</h1>
      <p>
        stunning templates &nbsp;·&nbsp; Fill your info &nbsp;·&nbsp; Download
        PDF
      </p>
    </header>

    <!-- TEMPLATE CARDS GRID -->
    <main class="templates-grid" id="grid"></main>

    <!-- MODAL -->
    <div class="modal-overlay" id="overlay">
      <div class="modal-container" id="mc">
        <div class="modal-header" id="mh">
          <div class="modal-title" id="mtitle"></div>
          <div class="modal-actions">
            <button class="btn-edit" id="bEdit" onclick="toggleEdit()">
              ✏️ Edit CV
            </button>
            <button class="btn-dl" id="bDl" onclick="downloadPDF()">
              ⬇ Download PDF
            </button>
            <button class="btn-close" onclick="closeModal()">✕</button>
          </div>
        </div>
        <div class="cv-wrap" id="mbody"></div>
      </div>
    </div>

    <script>
      /* ======================================================
   DATA
====================================================== */
      const TEMPLATES = [
        { id: 1, name: "Obsidian", label: "DARK LUXURY", cls: "t1" },
        { id: 2, name: "Arctic", label: "CORPORATE", cls: "t2" },
        { id: 3, name: "Ember", label: "WARM DARK", cls: "t3" },
        { id: 4, name: "Sage", label: "NATURE", cls: "t4" },
        { id: 5, name: "Neon", label: "CYBERPUNK", cls: "t5" },
        { id: 6, name: "Rose", label: "ELEGANT", cls: "t6" },
        { id: 7, name: "Slate", label: "BOLD DARK", cls: "t7" },
        { id: 8, name: "Parchment", label: "CLASSIC", cls: "t8" },
        { id: 9, name: "Ocean", label: "GRADIENT", cls: "t9" },
        { id: 10, name: "Monochrome", label: "MINIMAL", cls: "t10" },
        { id: 11, name: "Violet", label: "DEEP PURPLE", cls: "t11" },
        { id: 12, name: "Coral", label: "VIBRANT", cls: "t12" },
        { id: 13, name: "Galaxy", label: "COSMIC", cls: "t13" },
        { id: 14, name: "Pine", label: "FRESH GREEN", cls: "t14" },
        { id: 15, name: "Dusk", label: "WARM NIGHT", cls: "t15" },
        { id: 16, name: "Ivory", label: "GOLD SERIF", cls: "t16" },
        { id: 17, name: "Cyber", label: "TECH BLUE", cls: "t17" },
        { id: 18, name: "Bloom", label: "PURPLE PINK", cls: "t18" },
        { id: 19, name: "Denim", label: "PROFESSIONAL", cls: "t19" },
        { id: 20, name: "Midnight", label: "INDIGO TEAL", cls: "t20" },
      ];

      let activeT = null;
      let isEdit = false;
      let D = {
        name: "",
        jobtitle: "",
        email: "",
        phone: "",
        location: "",
        website: "",
        linkedin: "",
        objective: "",
        vision: "",
        education: [{ degree: "", school: "", year: "", gpa: "" }],
        skills: ["Teamwork", "Leadership", "Communication", "Problem Solving"],
        activities: [{ name: "", org: "", year: "" }],
        projects: [{ title: "", desc: "", link: "" }],
      };

      /* ======================================================
   RENDER CARDS
====================================================== */
      function renderCards() {
        const g = document.getElementById("grid");
        g.innerHTML = "";
        TEMPLATES.forEach((t) => {
          const card = document.createElement("div");
          card.className = "template-card " + t.cls;
          card.style.position = "relative";
          card.innerHTML = `
      <div class="card-label">${t.label}</div>
      <div class="card-preview">
        <div class="p-side">
          <div class="p-avatar"></div>
          <div class="p-line a"></div>
          <div class="p-line p-sm"></div>
          <div class="p-line"></div>
          <div class="p-line p-sm"></div>
          <div class="p-line"></div>
          <div class="p-line a p-sm"></div>
          <div class="p-line"></div>
          <div class="p-line p-sm"></div>
          <div class="p-line dark"></div>
        </div>
        <div class="p-main">
          <div class="p-line a"></div>
          <div class="p-line p-sm"></div>
          <div class="p-line"></div>
          <div class="p-block"></div>
          <div class="p-block"></div>
          <div class="p-line a p-sm"></div>
          <div class="p-block"></div>
        </div>
      </div>
      <div class="card-actions">
        <div class="card-name">${t.name}</div>
        <button class="btn-use" onclick="openT(${t.id})">Use Template →</button>
      </div>
    `;
          g.appendChild(card);
        });
      }

      /* ======================================================
   MODAL OPEN / CLOSE
====================================================== */
      function openT(id) {
        activeT = TEMPLATES.find((t) => t.id === id);
        isEdit = false;
        const mc = document.getElementById("mc");
        // strip previous mc-* class
        mc.className = "modal-container mc-" + activeT.cls;
        document.getElementById("mtitle").textContent =
          activeT.name + " Template";
        document.getElementById("bEdit").textContent = "✏️ Edit CV";
        renderPreview();
        document.getElementById("overlay").classList.add("active");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById("overlay").classList.remove("active");
        document.body.style.overflow = "";
      }

      document.getElementById("overlay").addEventListener("click", (e) => {
        if (e.target === document.getElementById("overlay")) closeModal();
      });

      /* ======================================================
   TOGGLE EDIT / PREVIEW
====================================================== */
      function toggleEdit() {
        if (isEdit) {
          collectData();
          renderPreview();
          isEdit = false;
          document.getElementById("bEdit").textContent = "✏️ Edit CV";
        } else {
          renderForm();
          isEdit = true;
          document.getElementById("bEdit").textContent = "👁 Preview";
        }
      }

      /* ======================================================
   FORM RENDER
====================================================== */
      function renderForm() {
        document.getElementById("mbody").innerHTML = `
  <div class="two-col">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="section">
        <div class="sec-title">Personal Information</div>
        <div class="fg"><label>Full Name</label>
          <input id="fn" placeholder="e.g. Alexandra Morgan" value="${x(D.name)}"></div>
        <div class="fg"><label>Professional Title</label>
          <input id="ft" placeholder="e.g. Senior UX Designer" value="${x(D.jobtitle)}"></div>
        <div class="fg"><label>Email Address</label>
          <input id="fe" type="email" placeholder="hello@example.com" value="${x(D.email)}"></div>
        <div class="fg"><label>Phone Number</label>
          <input id="fp" type="tel" placeholder="+1 (555) 000-0000" value="${x(D.phone)}"></div>
        <div class="fg"><label>City / Location</label>
          <input id="fl" placeholder="New York, NY" value="${x(D.location)}"></div>
        <div class="fg"><label>Website / Portfolio</label>
          <input id="fw" placeholder="www.yourportfolio.com" value="${x(D.website)}"></div>
        <div class="fg"><label>LinkedIn Profile</label>
          <input id="fli" placeholder="linkedin.com/in/yourname" value="${x(D.linkedin)}"></div>
      </div>

      <div class="section">
        <div class="sec-title">Education</div>
        <div id="edu-list">${D.education.map(eduCard).join("")}</div>
        <button class="add-btn" onclick="addEdu()">＋ Add Education</button>
      </div>

      <div class="section">
        <div class="sec-title">Skills</div>
        <div class="skills-box" id="sb">
          ${D.skills.map(skillTag).join("")}
          <input class="skill-inp" id="sinp" placeholder="Type skill + Enter…">
        </div>
      </div>

      <div class="section">
        <div class="sec-title">Curricular Activity</div>
        <div id="act-list">${D.activities.map(actCard).join("")}</div>
        <button class="add-btn" onclick="addAct()">＋ Add Activity</button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main-col">
      <div class="section">
        <div class="sec-title">Life Objective</div>
        <div class="fg">
          <textarea id="fo" rows="5"
            placeholder="What drives you professionally? Describe your career objective, the impact you want to create, and the value you bring to your field…">${x(D.objective)}</textarea>
        </div>
      </div>

      <div class="section">
        <div class="sec-title">Life Vision</div>
        <div class="fg">
          <textarea id="fv" rows="5"
            placeholder="Paint a picture of your long-term vision. Where do you see yourself in 10 years? What lasting legacy do you wish to leave behind in your industry?">${x(D.vision)}</textarea>
        </div>
      </div>

      <div class="section">
        <div class="sec-title">Real Projects</div>
        <div id="proj-list">${D.projects.map(projCard).join("")}</div>
        <button class="add-btn" onclick="addProj()">＋ Add Project</button>
      </div>
    </div>
  </div>`;

        // skill enter key
        setTimeout(() => {
          const si = document.getElementById("sinp");
          if (!si) return;
          si.onkeydown = (e) => {
            if ((e.key === "Enter" || e.key === ",") && si.value.trim()) {
              e.preventDefault();
              pushSkill(si.value.trim());
              si.value = "";
            }
          };
        }, 30);
      }

      function eduCard(e, i) {
        return `<div class="entry" id="edu${i}">
    <button class="rm" onclick="rmEl('edu${i}')">✕</button>
    <div class="fg"><label>Degree / Qualification</label>
      <input placeholder="e.g. B.Sc. Computer Science" value="${x(e.degree)}" onchange="D.education[${i}].degree=this.value"></div>
    <div class="fg"><label>Institution / University</label>
      <input placeholder="e.g. MIT, Harvard…" value="${x(e.school)}" onchange="D.education[${i}].school=this.value"></div>
    <div class="fg"><label>Years Attended</label>
      <input placeholder="2020 – 2024" value="${x(e.year)}" onchange="D.education[${i}].year=this.value"></div>
    <div class="fg"><label>GPA / Final Grade</label>
      <input placeholder="3.9 / 4.0  or  First Class" value="${x(e.gpa)}" onchange="D.education[${i}].gpa=this.value"></div>
  </div>`;
      }

      function actCard(a, i) {
        return `<div class="entry" id="act${i}">
    <button class="rm" onclick="rmEl('act${i}')">✕</button>
    <div class="fg"><label>Role / Position</label>
      <input placeholder="e.g. Club President, Volunteer" value="${x(a.name)}" onchange="D.activities[${i}].name=this.value"></div>
    <div class="fg"><label>Organization / Club</label>
      <input placeholder="e.g. Robotics Society" value="${x(a.org)}" onchange="D.activities[${i}].org=this.value"></div>
    <div class="fg"><label>Duration / Year</label>
      <input placeholder="2022 – Present" value="${x(a.year)}" onchange="D.activities[${i}].year=this.value"></div>
  </div>`;
      }

      function projCard(p, i) {
        return `<div class="entry" id="proj${i}">
    <button class="rm" onclick="rmEl('proj${i}')">✕</button>
    <div class="fg"><label>Project Title</label>
      <input placeholder="e.g. AI Portfolio Optimizer" value="${x(p.title)}" onchange="D.projects[${i}].title=this.value"></div>
    <div class="fg"><label>Description</label>
      <textarea rows="3" placeholder="Describe what you built, the technologies used, and the impact achieved…" onchange="D.projects[${i}].desc=this.value">${x(p.desc)}</textarea></div>
    <div class="fg"><label>Live Link / GitHub</label>
      <input placeholder="https://github.com/yourname/project" value="${x(p.link)}" onchange="D.projects[${i}].link=this.value"></div>
  </div>`;
      }

      function skillTag(s) {
        return `<span class="stag">${x(s)}<span class="rx" onclick="rmSkill('${x(s)}')">×</span></span>`;
      }

      function pushSkill(v) {
        if (v && !D.skills.includes(v)) {
          D.skills.push(v);
          const si = document.getElementById("sinp");
          const sp = document.createElement("span");
          sp.className = "stag";
          sp.innerHTML = `${x(v)}<span class="rx" onclick="rmSkill('${x(v)}')">×</span>`;
          document.getElementById("sb").insertBefore(sp, si);
        }
      }

      function rmSkill(v) {
        D.skills = D.skills.filter((s) => s !== v);
        renderForm();
      }
      function rmEl(id) {
        document.getElementById(id)?.remove();
      }
      function addEdu() {
        D.education.push({ degree: "", school: "", year: "", gpa: "" });
        renderForm();
      }
      function addAct() {
        D.activities.push({ name: "", org: "", year: "" });
        renderForm();
      }
      function addProj() {
        D.projects.push({ title: "", desc: "", link: "" });
        renderForm();
      }

      /* ======================================================
   COLLECT FORM DATA BEFORE PREVIEW / DOWNLOAD
====================================================== */
      function collectData() {
        const g = (id) => document.getElementById(id)?.value || "";
        D.name = g("fn");
        D.jobtitle = g("ft");
        D.email = g("fe");
        D.phone = g("fp");
        D.location = g("fl");
        D.website = g("fw");
        D.linkedin = g("fli");
        D.objective = g("fo");
        D.vision = g("fv");
        // live-bound via onchange for arrays
      }

      /* ======================================================
   PREVIEW RENDER
====================================================== */
      function renderPreview() {
        const d = D;
        const initials = d.name
          ? d.name
              .split(" ")
              .map((w) => w[0])
              .join("")
              .slice(0, 2)
              .toUpperCase()
          : "?";

        document.getElementById("mbody").innerHTML = `
  <div class="preview-root" id="cvroot">
    <!-- SIDEBAR -->
    <div class="prev-sidebar">
      <div class="prev-sec" style="text-align:center;">
        <div class="prev-avatar">${initials}</div>
        <div class="prev-name">${x(d.name) || '<span style="opacity:.3">Your Name</span>'}</div>
        <div class="prev-jobtitle">${x(d.jobtitle) || ""}</div>
      </div>

      <div class="prev-sec">
        <div class="prev-sec-title">Contact</div>
        ${d.email ? `<div class="prev-contact-item">📧 ${x(d.email)}</div>` : ""}
        ${d.phone ? `<div class="prev-contact-item">📞 ${x(d.phone)}</div>` : ""}
        ${d.location ? `<div class="prev-contact-item">📍 ${x(d.location)}</div>` : ""}
        ${d.website ? `<div class="prev-contact-item">🌐 ${x(d.website)}</div>` : ""}
        ${d.linkedin ? `<div class="prev-contact-item">💼 ${x(d.linkedin)}</div>` : ""}
        ${!d.email && !d.phone && !d.location ? `<span class="empty-hint">Add your contact details in Edit mode</span>` : ""}
      </div>

      <div class="prev-sec">
        <div class="prev-sec-title">Education</div>
        ${
          d.education
            .filter((e) => e.degree || e.school)
            .map(
              (e) => `
          <div class="prev-edu-item">
            <div class="prev-edu-deg">${x(e.degree) || "Degree"}</div>
            <div class="prev-edu-school">${x(e.school) || ""}</div>
            <div class="prev-edu-year">${x(e.year) || ""}${e.gpa ? " · GPA " + x(e.gpa) : ""}</div>
          </div>`,
            )
            .join("") ||
          `<span class="empty-hint">Add education in Edit mode</span>`
        }
      </div>

      <div class="prev-sec">
        <div class="prev-sec-title">Skills</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${d.skills.map((s) => `<span class="stag">${x(s)}</span>`).join("")}
        </div>
      </div>

      <div class="prev-sec">
        <div class="prev-sec-title">Curricular Activity</div>
        ${
          d.activities
            .filter((a) => a.name || a.org)
            .map(
              (a) => `
          <div style="margin-bottom:10px;">
            <div class="prev-act-name">${x(a.name) || "Role"}</div>
            <div class="prev-act-org">${x(a.org) || ""}</div>
            <div class="prev-act-year">${x(a.year) || ""}</div>
          </div>`,
            )
            .join("") ||
          `<span class="empty-hint">Add activities in Edit mode</span>`
        }
      </div>
    </div>

    <!-- MAIN -->
    <div class="prev-main">
      <div class="prev-sec">
        <div class="prev-sec-title">Life Objective</div>
        <p class="prev-body">${
          d.objective
            ? x(d.objective)
            : '<span style="opacity:.35">Your career objective will appear here. Click ✏️ Edit CV and fill in your objective.</span>'
        }</p>
      </div>

      <div class="prev-sec">
        <div class="prev-sec-title">Life Vision</div>
        <p class="prev-body">${
          d.vision
            ? x(d.vision)
            : '<span style="opacity:.35">Your life vision will appear here. Describe where you see yourself in the future.</span>'
        }</p>
      </div>

      <div class="prev-sec">
        <div class="prev-sec-title">Real Projects</div>
        ${
          d.projects
            .filter((p) => p.title || p.desc)
            .map(
              (p) => `
          <div class="prev-proj">
            <div class="prev-proj-title">🚀 ${x(p.title) || "Untitled Project"}</div>
            <div class="prev-proj-desc">${x(p.desc) || ""}</div>
            ${p.link ? `<div class="prev-proj-link">🔗 ${x(p.link)}</div>` : ""}
          </div>`,
            )
            .join("") ||
          `<span class="empty-hint">Add your real projects in Edit mode to showcase your work.</span>`
        }
      </div>
    </div>
  </div>`;
      }

      /* ======================================================
   DOWNLOAD PDF  (pure browser print — no CDN needed)
====================================================== */
      function downloadPDF() {
        if (isEdit) {
          collectData();
          renderPreview();
          isEdit = false;
          document.getElementById("bEdit").textContent = "✏️ Edit CV";
        }

        const root = document.getElementById("cvroot");
        if (!root) {
          alert("Open a template first.");
          return;
        }

        const btn = document.getElementById("bDl");
        btn.textContent = "⏳ Preparing…";
        btn.disabled = true;

        // Grab computed styles of modal container for the PDF page
        const mc = document.getElementById("mc");
        const bg = getComputedStyle(mc).backgroundColor;
        const color = getComputedStyle(mc).color;

        const html = `<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:${bg};color:${color};padding:30px;}
  .preview-root{display:grid;grid-template-columns:240px 1fr;gap:20px;min-height:600px;}
  .prev-sidebar,.prev-main{display:flex;flex-direction:column;gap:14px;}
  .prev-sec{border-radius:12px;padding:14px;background:rgba(255,255,255,.06);}
  .prev-sec-title{font-size:.64rem;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;opacity:.65;}
  .prev-name{font-size:1.35rem;font-weight:800;line-height:1.2;}
  .prev-jobtitle{font-size:.8rem;opacity:.6;margin-top:3px;}
  .prev-avatar{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:800;margin:0 auto 10px;background:rgba(255,255,255,.2);}
  .prev-contact-item{font-size:.76rem;margin-bottom:5px;opacity:.78;}
  .prev-edu-item{margin-bottom:10px;}
  .prev-edu-deg{font-weight:700;font-size:.83rem;}
  .prev-edu-school{font-size:.76rem;opacity:.65;}
  .prev-edu-year{font-size:.7rem;opacity:.5;}
  .prev-act-name{font-weight:700;font-size:.83rem;}
  .prev-act-org{font-size:.76rem;opacity:.65;}
  .stag{display:inline-flex;padding:3px 10px;border-radius:50px;font-size:.73rem;font-weight:600;background:rgba(255,255,255,.12);margin:2px;}
  .prev-body{font-size:.86rem;line-height:1.75;opacity:.85;}
  .prev-proj{border-radius:9px;padding:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);margin-bottom:12px;}
  .prev-proj-title{font-weight:800;font-size:.9rem;margin-bottom:5px;}
  .prev-proj-desc{font-size:.8rem;line-height:1.6;opacity:.78;margin-bottom:6px;}
  .prev-proj-link{font-size:.72rem;opacity:.6;word-break:break-all;}
</style>
</head><body>${root.outerHTML}</body></html>`;

        const w = window.open("", "_blank", "width=900,height=700");
        w.document.write(html);
        w.document.close();
        w.focus();
        setTimeout(() => {
          w.print();
          btn.textContent = "⬇ Download PDF";
          btn.disabled = false;
          notify("✅ Print dialog opened — save as PDF!");
        }, 600);
      }

      /* ======================================================
   HELPERS
====================================================== */
      function x(v) {
        return String(v || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function notify(msg) {
        const n = document.createElement("div");
        n.className = "notif";
        n.textContent = msg;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3200);
      }

      /* ── INIT ── */
      renderCards();
    </script>
  </body>
</html>
